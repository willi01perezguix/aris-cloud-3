name: Postgres Compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
  push:
    branches: [main]

jobs:
  test-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    env:
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Export Postgres env
        run: |
          echo "PGHOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "PGPORT=${{ job.services.postgres.ports[5432] }}" >> "$GITHUB_ENV"
          echo "PGUSER=postgres" >> "$GITHUB_ENV"
          echo "PGPASSWORD=postgres" >> "$GITHUB_ENV"
          echo "PGDATABASE=postgres" >> "$GITHUB_ENV"
          echo "DATABASE_URL=postgresql+psycopg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/postgres" >> "$GITHUB_ENV"
          echo "POSTGRES_GATE_URL=postgresql+psycopg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/postgres" >> "$GITHUB_ENV"
          echo "PG_WAIT_DSN=postgresql://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/postgres" >> "$GITHUB_ENV"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Postgres env coherence
        run: |
          python - <<'PY'
          import os
          from sqlalchemy.engine import make_url
          import psycopg

          db_url = os.environ["DATABASE_URL"]
          gate_url = os.environ.get("POSTGRES_GATE_URL")
          wait_dsn = os.environ["PG_WAIT_DSN"]

          assert db_url == gate_url, "DATABASE_URL and POSTGRES_GATE_URL must match"
          parsed = make_url(db_url)
          assert parsed.username == os.environ["PGUSER"]
          assert parsed.password == os.environ["PGPASSWORD"]
          assert str(parsed.port) == os.environ["PGPORT"]
          assert parsed.host == os.environ["PGHOST"]

          conn = psycopg.connect(wait_dsn, connect_timeout=3)
          with conn.cursor() as cur:
              cur.execute("select 1")
              print(cur.fetchone())
          conn.close()
          print("postgres env coherence OK")
          PY

      - name: Wait for Postgres (auth + ready)
        run: |
          python - <<'PY'
          import os, time
          import psycopg

          dsn = os.environ["PG_WAIT_DSN"]
          last = None
          for _ in range(60):
              try:
                  conn = psycopg.connect(dsn, connect_timeout=2)
                  with conn.cursor() as cur:
                      cur.execute("select current_user, current_database()")
                      print(cur.fetchone())
                  conn.close()
                  print("postgres ready/auth OK")
                  break
              except Exception as e:
                  last = e
                  time.sleep(1)
          else:
              raise SystemExit(f"postgres not ready/auth failed: {last}")
          PY

      - name: Alembic sanity
        run: |
          alembic heads
          python -c "import subprocess, sys; output = subprocess.check_output(['alembic','heads']).decode().strip().splitlines(); heads = [line for line in output if line.strip()]; sys.exit(f'Expected 1 alembic head, got {len(heads)}: {heads}') if len(heads) != 1 else None"
          alembic upgrade head

      - name: Compatibility tests
        run: |
          pytest -q tests/test_admin_auth_contract_hardening.py tests/test_access_control_boundaries.py tests/test_access_control_policies.py

  readiness-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    env:
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Export Postgres env
        run: |
          echo "PGHOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "PGPORT=${{ job.services.postgres.ports[5432] }}" >> "$GITHUB_ENV"
          echo "PGUSER=postgres" >> "$GITHUB_ENV"
          echo "PGPASSWORD=postgres" >> "$GITHUB_ENV"
          echo "PGDATABASE=postgres" >> "$GITHUB_ENV"
          echo "DATABASE_URL=postgresql+psycopg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/postgres" >> "$GITHUB_ENV"
          echo "POSTGRES_GATE_URL=postgresql+psycopg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/postgres" >> "$GITHUB_ENV"
          echo "PG_WAIT_DSN=postgresql://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/postgres" >> "$GITHUB_ENV"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate Postgres env coherence
        run: |
          python - <<'PY'
          import os
          from sqlalchemy.engine import make_url
          import psycopg

          db_url = os.environ["DATABASE_URL"]
          gate_url = os.environ.get("POSTGRES_GATE_URL")
          wait_dsn = os.environ["PG_WAIT_DSN"]

          assert db_url == gate_url, "DATABASE_URL and POSTGRES_GATE_URL must match"
          parsed = make_url(db_url)
          assert parsed.username == os.environ["PGUSER"]
          assert parsed.password == os.environ["PGPASSWORD"]
          assert str(parsed.port) == os.environ["PGPORT"]
          assert parsed.host == os.environ["PGHOST"]

          conn = psycopg.connect(wait_dsn, connect_timeout=3)
          with conn.cursor() as cur:
              cur.execute("select 1")
              print(cur.fetchone())
          conn.close()
          print("postgres env coherence OK")
          PY

      - name: Wait for Postgres (auth + ready)
        run: |
          python - <<'PY'
          import os, time
          import psycopg

          dsn = os.environ["PG_WAIT_DSN"]
          last = None
          for _ in range(60):
              try:
                  conn = psycopg.connect(dsn, connect_timeout=2)
                  with conn.cursor() as cur:
                      cur.execute("select current_user, current_database()")
                      print(cur.fetchone())
                  conn.close()
                  print("postgres ready/auth OK")
                  break
              except Exception as e:
                  last = e
                  time.sleep(1)
          else:
              raise SystemExit(f"postgres not ready/auth failed: {last}")
          PY
      - name: Alembic upgrade (postgres)
        run: alembic upgrade head
      - name: Release readiness gate (postgres)
        run: |
          python scripts/release_readiness_gate.py --pytest-target tests/smoke/test_post_merge_readiness.py --postgres-url "$POSTGRES_GATE_URL"
      - name: Day 7 go-live smoke (postgres)
        run: |
          pytest -q tests/smoke/test_go_live_validation.py
